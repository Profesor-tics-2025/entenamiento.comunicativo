<VirtualHost *:80>
    ServerName comunicacion.cibermedida.es
    Redirect permanent / https://comunicacion.cibermedida.es/
</VirtualHost>

<VirtualHost *:443>
    ServerName comunicacion.cibermedida.es

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/comunicacion.cibermedida.es/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/comunicacion.cibermedida.es/privkey.pem

    # Proxy API and WebSocket to Node.js
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3002/api
    ProxyPassReverse /api http://localhost:3002/api

    # Serve compiled React frontend as static files
    DocumentRoot /var/www/entrenamiento/client/dist
    <Directory /var/www/entrenamiento/client/dist>
        Options -Indexes
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set Referrer-Policy strict-origin-when-cross-origin

    ErrorLog ${APACHE_LOG_DIR}/entrenamiento_error.log
    CustomLog ${APACHE_LOG_DIR}/entrenamiento_access.log combined
</VirtualHost>
