# /etc/apache2/sites-available/comunicacion.conf
# Certbot añadirá automáticamente la sección HTTPS al ejecutar certbot --apache

<VirtualHost *:80>
    ServerName comunicacion.cibermedida.es
    # Certbot reemplazará este bloque con la redirección HTTPS
    DocumentRoot /opt/comunicacion/client/dist

    <Directory /opt/comunicacion/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ProxyPreserveHost On
    # Trailing slash en ambos lados: OBLIGATORIO para evitar problemas de enrutamiento
    ProxyPass /api/ http://127.0.0.1:3002/api/
    ProxyPassReverse /api/ http://127.0.0.1:3002/api/

    ErrorLog ${APACHE_LOG_DIR}/comunicacion-error.log
    CustomLog ${APACHE_LOG_DIR}/comunicacion-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName comunicacion.cibermedida.es

    # SSL — Certbot rellena estas rutas automáticamente
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/comunicacion.cibermedida.es/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/comunicacion.cibermedida.es/privkey.pem

    # mod_remoteip: pasa la IP real del cliente al backend
    # Necesario para que express-rate-limit funcione correctamente
    RemoteIPHeader X-Forwarded-For
    RemoteIPInternalProxy 127.0.0.1

    # Frontend: ficheros estáticos del build de Vite
    DocumentRoot /opt/comunicacion/client/dist

    <Directory /opt/comunicacion/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # SPA routing: todo lo que no sea fichero físico → index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Backend API → Node.js en puerto 3002
    # Trailing slash en ambos lados: OBLIGATORIO
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3002/api/
    ProxyPassReverse /api/ http://127.0.0.1:3002/api/

    # Cabeceras de seguridad
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # HTTPS obligatorio para cámara y micrófono (getUserMedia requiere HTTPS)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    # Permitir cámara/micrófono en el frontend
    Header always set Permissions-Policy "camera=self, microphone=self"

    ErrorLog ${APACHE_LOG_DIR}/comunicacion-error.log
    CustomLog ${APACHE_LOG_DIR}/comunicacion-access.log combined
</VirtualHost>
